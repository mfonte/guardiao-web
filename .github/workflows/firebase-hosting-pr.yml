name: Firebase Hosting — Preview Channel

# Cria um preview channel temporario do Firebase Hosting pra cada PR.
# URL fica tipo: pr-42--<projeto>.web.app

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "dashboard/**"
      - "index.html"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-hosting-pr.yml"

concurrency:
  group: hosting-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect dashboard
        id: detect
        run: |
          if [ -f "dashboard/package.json" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
            echo "::notice::dashboard/ ainda nao existe. Preview vai deployar so a landing (index.html)."
          fi

      - uses: actions/setup-node@v6
        if: steps.detect.outputs.build == 'true'
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard
        if: steps.detect.outputs.build == 'true'
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Deploy to preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: iotemp-sensor
          expires: 7d
          channelId: pr-${{ github.event.pull_request.number }}
